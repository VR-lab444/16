<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Woman Animations</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #ffffff 0%, #f7f7f7 100%);
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }

    .shadow {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 40px;
      background: radial-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0));
      border-radius: 50%;
      filter: blur(10px);
      pointer-events: none;
    }

    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(8px);
    }

    button {
      min-width: 110px;
      padding: 12px 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      background: #ffffff;
      color: #222;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
      background: #f5f5f5;
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .stop {
      background: #f3f3f3;
    }

    .walk {
      background: #eaf4ff;
    }

    .jump {
      background: #fff0f5;
    }
  </style>
</head>
<body>

  <div class="scene">
    <model-viewer
      id="mv"
      src="./Woman.glb"
      camera-controls
      shadow-intensity="1.2"
      exposure="1.1"
      environment-image="neutral"
      camera-orbit="0deg 75deg 2.8m"
      min-camera-orbit="auto auto 1.8m"
      max-camera-orbit="auto auto 4m"
      interaction-prompt="none">
    </model-viewer>

    <div class="shadow"></div>
  </div>

  <div id="controls">
    <button id="btnStop" class="stop">Stop</button>
    <button id="btnWalk" class="walk">Walk</button>
    <button id="btnJump" class="jump">Jump</button>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const btnStop = document.getElementById('btnStop');
    const btnWalk = document.getElementById('btnWalk');
    const btnJump = document.getElementById('btnJump');

    mv.addEventListener('load', () => {
      console.log('Модель загружена');
      console.log('Анимации:', mv.availableAnimations);
    });

    btnStop.addEventListener('click', () => {
      mv.pause();
      mv.currentTime = 0;
    });

    btnWalk.addEventListener('click', () => {
      mv.animationName = 'walk';
      mv.currentTime = 0;
      mv.play();
    });

    btnJump.addEventListener('click', () => {
      mv.animationName = 'jump';
      mv.currentTime = 0;
      mv.play();
    });
  </script>

</body>
</html>
